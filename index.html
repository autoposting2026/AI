<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="AI automation for social media and WordPress: posts, videos, and blogs with minimal effort on your part. SEO, visibility, and more sales." />
  <title>AI Automation for Social Media and WordPress — Posts, Videos, Blog</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300,400,600,700&family=Manrope:wght@300,400,500,600,700&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Aesthetic: Editorial / Swiss with warm tech accents */
      --bg: #0b0f14;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.09);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --faint: rgba(255,255,255,.52);

      --brand: #c7ff6b; /* acid-lime */
      --brand2: #7dd3ff; /* soft-cyan */
      --accent: #ff6bd6; /* magenta */
      --warn: #ffd36b;

      --stroke: rgba(255,255,255,.12);
      --stroke2: rgba(199,255,107,.22);

      --shadow: 0 30px 80px rgba(0,0,0,.45);
      --shadow2: 0 12px 30px rgba(0,0,0,.35);

      --radius: 18px;
      --radius2: 26px;
      --max: 1180px;

      --h1: clamp(2.2rem, 4.1vw, 4.2rem);
      --h2: clamp(1.6rem, 2.5vw, 2.4rem);
      --h3: clamp(1.1rem, 1.4vw, 1.3rem);
      --p: clamp(1.0rem, 1.05vw, 1.08rem);
      --small: .95rem;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Manrope, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 700px at 10% -10%, rgba(125,211,255,.18), transparent 60%),
                  radial-gradient(900px 650px at 95% 10%, rgba(255,107,214,.14), transparent 55%),
                  radial-gradient(1000px 700px at 40% 110%, rgba(199,255,107,.12), transparent 60%),
                  linear-gradient(180deg, #070a0f 0%, #0b0f14 55%, #070a0f 100%);
      overflow-x:hidden;
    }

    a{color:inherit; text-decoration:none}
    .container{max-width:var(--max); margin-inline:auto; padding: clamp(18px, 3vw, 34px);}
    .grid{display:grid; gap: clamp(14px, 2vw, 22px);}

    /* Top nav */
    header{
      position:sticky; top:0; z-index:50;
      background: linear-gradient(180deg, rgba(11,15,20,.86) 0%, rgba(11,15,20,.60) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--stroke);
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      gap: 14px;
    }
    .brandmark{
      display:flex; align-items:baseline; gap:10px;
      letter-spacing: .02em;
      min-width: 220px;
    }
    .logo{
      width: 14px; height: 14px; border-radius: 4px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand2) 60%, var(--accent) 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 12px 26px rgba(0,0,0,.35);
      transform: translateY(-1px);
    }
    .brandmark strong{
      font-family: Fraunces, serif;
      font-weight: 650;
      font-size: 1.08rem;
    }
    .brandmark span{
      color: var(--muted);
      font-size: .92rem;
      font-weight: 500;
    }

    nav ul{
      list-style:none; padding:0; margin:0;
      display:flex; gap: clamp(10px, 1.7vw, 18px);
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    nav a{
      color: var(--muted);
      font-size: .95rem;
      font-weight: 600;
      padding: 10px 10px;
      border-radius: 12px;
      transition: transform .15s ease, background .15s ease, color .15s ease;
    }
    nav a:hover{
      color: var(--text);
      background: rgba(255,255,255,.06);
      transform: translateY(-1px);
    }

    .nav-cta{
      display:flex; gap:10px; align-items:center;
    }

    .btn{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 700;
      letter-spacing: .01em;
      display:inline-flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.07);
      box-shadow: var(--shadow2);
      border-color: rgba(255,255,255,.18);
    }
    .btn:active{transform: translateY(0px) scale(.99)}
    .btn.primary{
      border-color: rgba(199,255,107,.35);
      background: linear-gradient(135deg, rgba(199,255,107,.22), rgba(125,211,255,.12));
      box-shadow: 0 18px 44px rgba(0,0,0,.35);
    }
    .btn.primary:hover{
      border-color: rgba(199,255,107,.55);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }

    .pill{
      display:inline-flex; align-items:center; gap:10px;
      padding: 8px 12px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      color: var(--muted);
      font-weight: 650;
      font-size: .92rem;
    }
    .dot{
      width: 8px; height: 8px; border-radius: 99px;
      background: var(--brand);
      box-shadow: 0 0 0 4px rgba(199,255,107,.12);
    }

    /* Hero */
    .hero{
      padding-top: clamp(18px, 3.2vw, 36px);
      padding-bottom: clamp(34px, 5vw, 70px);
    }
    .hero-grid{
      grid-template-columns: 1.1fr .9fr;
      align-items:stretch;
    }
    .hero h1{
      font-family: Fraunces, serif;
      font-weight: 650;
      font-size: var(--h1);
      line-height: 1.02;
      margin: 14px 0 14px;
      letter-spacing: -0.02em;
    }
    .lead{
      font-size: var(--p);
      color: var(--muted);
      line-height: 1.65;
      max-width: 60ch;
      margin: 0 0 18px;
    }

    .hero-actions{
      display:flex;
      gap: 12px;
      align-items:center;
      flex-wrap:wrap;
      margin-top: 16px;
    }

    .trustline{
      display:flex; gap: 14px; flex-wrap:wrap; align-items:center;
      margin-top: 22px;
      color: var(--faint);
      font-size: .95rem;
    }
    .trustline b{color: rgba(255,255,255,.78); font-weight: 800}

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .panel::before{
      content:"";
      position:absolute; inset:-2px;
      background: radial-gradient(600px 300px at 20% 0%, rgba(199,255,107,.16), transparent 60%),
                  radial-gradient(500px 380px at 90% 20%, rgba(125,211,255,.14), transparent 55%),
                  radial-gradient(420px 420px at 60% 110%, rgba(255,107,214,.10), transparent 60%);
      pointer-events:none;
      filter: saturate(1.1);
    }
    .panel-inner{position:relative; padding: clamp(16px, 2.6vw, 26px);}

    /* "Automation map" visual */
    .map{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .map-top{
      display:flex; align-items:flex-start; justify-content:space-between; gap: 12px;
    }
    .map-title{
      display:flex; flex-direction:column; gap: 6px;
    }
    .map-title h3{
      margin:0;
      font-size: var(--h3);
      letter-spacing: .01em;
      color: rgba(255,255,255,.90);
    }
    .map-title p{margin:0; color: var(--muted); font-size: .95rem; line-height:1.5}

    .map-rail{
      border-top: 1px dashed rgba(255,255,255,.18);
      margin-top: 10px;
      padding-top: 16px;
      display:grid;
      gap: 12px;
    }
    .node{
      display:grid;
      grid-template-columns: 40px 1fr;
      gap: 12px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .node:hover{
      transform: translateY(-1px);
      border-color: rgba(199,255,107,.25);
      background: rgba(0,0,0,.22);
    }
    .icon{
      width: 40px; height: 40px; border-radius: 14px;
      display:grid; place-items:center;
      background: linear-gradient(135deg, rgba(199,255,107,.20), rgba(125,211,255,.10));
      border: 1px solid rgba(199,255,107,.18);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .node b{display:block; font-weight: 850; color: rgba(255,255,255,.90)}
    .node span{display
